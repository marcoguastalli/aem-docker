services:
  author:
    image: "aem-author:latest"
    build:
      context: ./author
    ports:
      - "4502:4502"
    volumes:
      - ./author/crx-quickstart:/opt/aem/crx-quickstart
      - ./logging/author-logs:/opt/aem/crx-quickstart/logs
    environment:
      AEM_RUNMODE: author,local
      ADMIN_PASSWORD: ${AEM_PASSWORD:-admin}
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf -u admin:${AEM_PASSWORD:-admin} http://localhost:4502/libs/granite/core/content/login.html | grep -q QUICKSTART_HOMEPAGE"]
      interval: 20s
      timeout: 10s
      retries: 30
      start_period: 60s
    restart: unless-stopped
    networks:
      - aem-network

  publish:
    image: "aem-publish:latest"
    build:
      context: ./publish
    ports:
      - "4503:4503"
    volumes:
      - ./publish/crx-quickstart:/opt/aem/crx-quickstart
      - ./logging/publish-logs:/opt/aem/crx-quickstart/logs
    environment:
      AEM_RUNMODE: publish,local
      ADMIN_PASSWORD: ${AEM_PASSWORD:-admin}
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf -u admin:${AEM_PASSWORD:-admin} http://localhost:4503/libs/granite/core/content/login.html | grep -q QUICKSTART_HOMEPAGE"]
      interval: 20s
      timeout: 10s
      retries: 30
      start_period: 60s
    restart: unless-stopped
    networks:
      - aem-network

  # AEM SDK dispatcher image, run in "flexible mode" the same way the SDK's
  # bin/docker_run.sh does: config sources mounted at /mnt/dev/src, SDK lib
  # scripts mounted into the entrypoint. Load the image once with:
  #   gunzip -c $DISPATCHER_SDK/lib/dispatcher-publish-arm64.tar.gz | docker load
  # The entrypoint waits for AEM_HOST:AEM_PORT itself, so no depends_on here —
  # the dispatcher can start before (or without) publish.
  dispatcher:
    image: "${DISPATCHER_IMAGE}"
    ports:
      - "8080:80"
    volumes:
      - ./dispatcher/src:/mnt/dev/src:ro
      - ./dispatcher/cache:/mnt/var/www
      - ${DISPATCHER_SDK}/lib:/usr/lib/dispatcher-sdk:ro
      - ${DISPATCHER_SDK}/lib/import_sdk_config.sh:/docker_entrypoint.d/zzz-import-sdk-config.sh:ro
      - ${DISPATCHER_SDK}/lib/dummy_gitinit_metadata.sh:/docker_entrypoint.d/zzz-overwrite_gitinit_metadata.sh:ro
    environment:
      AEM_HOST: publish
      AEM_PORT: 4503
      ENVIRONMENT_TYPE: ${DISP_RUN_MODE:-dev}
      DISP_LOG_LEVEL: ${DISP_LOG_LEVEL:-warn}
      REWRITE_LOG_LEVEL: ${REWRITE_LOG_LEVEL:-warn}
      ENABLE_MANAGED_REWRITE_MAPS_FLAG: "true"
    restart: unless-stopped
    networks:
      - aem-network

  # HTTPS termination in front of the HTTP-only dispatcher.
  nginx:
    image: "nginx:1.31.2-alpine"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - dispatcher
    restart: unless-stopped
    networks:
      - aem-network

networks:
  aem-network:
